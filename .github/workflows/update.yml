name: "Update Packages"

on:
  # Berjalan otomatis setiap minggu pada jam 00:00 UTC (07:00 WIB)
  schedule:
    - cron: '0 0 * * 0'
  
  # Memungkinkan kamu menjalankan skrip ini secara manual via tombol di web GitHub
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    
    # Menggunakan fitur Matrix agar kita bisa mengecek banyak paket secara paralel
    strategy:
      fail-fast: false
      matrix:
        package:
          - zennotes
          - helium-browser

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run nix-update
        # Menjalankan utilitas nix-update langsung dari ekosistem flake
        run: |
          nix run nixpkgs#nix-update -- --flake ${{ matrix.package }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          # Token bawaan dari GitHub Actions
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ matrix.package }}"
          title: "Update ${{ matrix.package }} to latest version"
          body: |
            Automated package update generated by [nix-update](https://github.com/Mic92/nix-update).
            
            Silakan periksa hasil build dan merge jika sudah sesuai.
          branch: "update-${{ matrix.package }}"
          delete-branch: true
